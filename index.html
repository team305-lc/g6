<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G6 | Basketball Club</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ヒーロー -->
  <section class="hero">
    <div class="hero-slides">
      <div class="hero-slide active" style="background-image:url('img/hero-4.jpg')"></div>
      <div class="hero-slide" style="background-image:url('img/hero-1.jpg')"></div>
      <div class="hero-slide" style="background-image:url('img/hero-2.jpg')"></div>
      <div class="hero-slide" style="background-image:url('img/hero-3.jpg')"></div>
    </div>
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="hero-badge">🏆 Basketball Club</div>
      <h1 class="hero-title">
        PLAY HARD,<br>
        <span>WIN TOGETHER</span>
      </h1>
      <p class="hero-sub">G6 — チームの記録を、ここに。</p>

      <div class="hero-btns">
        <a href="html/movie.html">
          <button class="btn btn-primary">🎬 試合動画を見る</button>
        </a>
      </div>
    </div>

    <div class="slide-dots" id="slide-dots"></div>
  </section>

  <script src="js/layout.js"></script>
  <script src="js/slideshow.js"></script>
</body>
</html>
